<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --aura-purple: #815bf5; --aura-cyan: #00ffa3; --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --up: #00ffa3; --down: #ff5e5e;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            background: var(--bg-deep); 
            margin: 0; padding: 0; 
            width: 100%; height: 100dvh; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; 
            overflow: hidden; 
        }

        .aurora-bg { 
            position: fixed; inset: 0; z-index: 0; 
            background: radial-gradient(circle at 10% 10%, rgba(129, 91, 245, 0.1) 0%, transparent 40%), 
                        radial-gradient(circle at 90% 90%, rgba(0, 255, 163, 0.06) 0%, transparent 40%); 
        }

        .app-container { 
            width: 100%; height: 100dvh; 
            position: relative; 
            display: flex; flex-direction: column; 
            z-index: 1; 
        }

        /* REFRESH INDICATOR */
        #pull-indicator { 
            position: absolute; top: calc(20px + var(--safe-top)); left: 50%; 
            transform: translateX(-50%) scale(0); width: 35px; height: 35px; 
            background: var(--aura-purple); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; transition: transform 0.1s; 
        }
        .spinning i { animation: rotate-icon 0.8s linear infinite; }
        @keyframes rotate-icon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* LOCK SCREEN */
        #lock-screen { 
            position: fixed; inset: 0; background: #030305; z-index: 2100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* MODALS */
        .slide-modal { 
            position: fixed; inset: 0; background: #030305; z-index: 1500; 
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: calc(40px + var(--safe-top)) 25px calc(20px + var(--safe-bottom)); 
            display: flex; flex-direction: column; overflow-y: auto; 
        }
        .slide-modal.open { transform: translateY(0); }

        /* SCROLL VIEW - Ocupa tot ecranul pana jos */
        .scroll-view { 
            flex: 1; overflow-y: auto; 
            padding: calc(30px + var(--safe-top)) 22px calc(110px + var(--safe-bottom)); 
            scrollbar-width: none; 
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            will-change: transform;
        }

        .brand-header { text-align: center; margin-bottom: 30px; }
        .pfp-wrap { width: 62px; height: 62px; border-radius: 50%; border: 2px solid var(--glass-border); margin: 0 auto 12px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        #user-pfp, #prof-pfp { width: 100%; height: 100%; object-fit: cover; }
        
        .amount-display { font-weight: 800; font-size: 46px; text-align: center; letter-spacing: -2px; margin: 5px 0; }
        #pnl-summary { font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 35px; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; }
        .action-btn { background: var(--glass); border-radius: 22px; border: 1px solid var(--glass-border); height: 60px; display: flex; align-items: center; justify-content: center; color: var(--aura-cyan); font-size: 20px; }

        .asset-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 28px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); }
        .logo-box img { width: 28px; height: 28px; }

        /* FOOTER COMPLET INCRADRAT */
        .footer { 
            position: fixed; bottom: 0; width: 100%; 
            height: calc(80px + var(--safe-bottom)); 
            background: rgba(5, 5, 8, 0.96); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; align-items: flex-start; 
            border-top: 1px solid var(--glass-border); 
            padding-top: 15px;
            padding-bottom: var(--safe-bottom); z-index: 100; 
        }
        .nav-item { color: rgba(255,255,255,0.2); font-size: 22px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .nav-special { color: #000; background: #fff; width: 56px; height: 56px; transform: translateY(-18px) rotate(45deg); border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg-deep); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-special i { transform: rotate(-45deg); }

        .pin-dots { display: flex; gap: 18px; margin-bottom: 60px; }
        .dot { width: 14px; height: 14px; border: 2px solid var(--glass-border); border-radius: 50%; transition: 0.2s; }
        .dot.filled { background: var(--aura-purple); border-color: var(--aura-purple); box-shadow: 0 0 15px var(--aura-purple); }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .pin-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; font-size: 28px; font-weight: 600; display: flex; align-items: center; justify-content: center; }

        .adm-input-custom { width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; color: var(--aura-cyan); font-family: inherit; margin-bottom: 15px; border: 1px solid var(--glass-border); }
        .commit-btn { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--aura-purple), #a885ff); border: none; border-radius: 24px; color: white; font-weight: 800; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="aurora-bg"></div>

<div class="app-container">
    <div id="pull-indicator"><i class="fa-solid fa-rotate"></i></div>

    <div id="lock-screen">
        <div id="lock-title" style="margin-bottom:40px; font-weight:800; letter-spacing: 1px; color:rgba(255,255,255,0.8)">ENTER PIN</div>
        <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pin-pad">
            <div class="pin-btn" onclick="pressKey('1')">1</div><div class="pin-btn" onclick="pressKey('2')">2</div><div class="pin-btn" onclick="pressKey('3')">3</div>
            <div class="pin-btn" onclick="pressKey('4')">4</div><div class="pin-btn" onclick="pressKey('5')">5</div><div class="pin-btn" onclick="pressKey('6')">6</div>
            <div class="pin-btn" onclick="pressKey('7')">7</div><div class="pin-btn" onclick="pressKey('8')">8</div><div class="pin-btn" onclick="pressKey('9')">9</div>
            <div style="width:80px"></div><div class="pin-btn" onclick="pressKey('0')">0</div><div class="pin-btn" onclick="pressKey('del')"><i class="fa-solid fa-delete-left"></i></div>
        </div>
    </div>

    <div class="scroll-view" id="main-scroll">
        <div class="brand-header">
            <div class="pfp-wrap"><img id="user-pfp" src=""></div>
            <div id="disp-name" style="font-weight:800; font-size:16px">AURA ONE</div>
            <div id="disp-acc" style="color:rgba(255,255,255,0.4); font-size:12px">@user</div>
        </div>
        
        <div class="amount-display" id="main-val">$0.00</div>
        <div id="pnl-summary"></div>

        <div id="search-wrapper" style="max-height:0; opacity:0; overflow:hidden; transition:0.4s; margin-bottom: 20px;">
            <input type="text" class="adm-input-custom" id="asset-search" placeholder="Enter Secret Code..." oninput="checkSecret()">
        </div>

        <div class="action-grid">
            <div class="action-btn"><i class="fa-solid fa-paper-plane"></i></div>
            <div class="action-btn"><i class="fa-solid fa-qrcode"></i></div>
            <div class="action-btn"><i class="fa-solid fa-rotate"></i></div>
            <div class="action-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>

        <div id="asset-container"></div>
    </div>

    <div id="admin-modal" class="slide-modal">
        <h2 style="color:var(--aura-purple); margin-bottom:25px;">System Console</h2>
        <input type="text" id="adm-name" class="adm-input-custom" placeholder="Display Name">
        <input type="text" id="adm-acc" class="adm-input-custom" placeholder="@handle">
        <div style="padding:25px; border:2px dashed var(--glass-border); border-radius:24px; text-align:center; position:relative; margin-bottom:20px; background: var(--glass);">
            <span id="upload-status" style="font-weight:600; font-size:13px;">Update Profile Photo</span>
            <input type="file" id="adm-pfp-input" accept="image/*" onchange="handlePFPSelection(event)" style="position:absolute; inset:0; opacity:0;">
        </div>
        <input type="number" id="adm-btc" class="adm-input-custom" placeholder="BTC Balance">
        <input type="number" id="adm-eth" class="adm-input-custom" placeholder="ETH Balance">
        <input type="number" id="adm-sol" class="adm-input-custom" placeholder="SOL Balance">
        <button class="commit-btn" onclick="applyChanges()">SAVE ALL CHANGES</button>
        <button class="commit-btn" style="background:var(--glass); margin-top:15px;" onclick="closeAdmin()">CANCEL</button>
    </div>

    <div id="profile-modal" class="slide-modal">
        <h2 style="text-align:center; margin-bottom:40px;">Profile Settings</h2>
        <div style="text-align:center; margin-bottom:50px;">
            <div class="pfp-wrap" style="width:110px; height:110px; border:3px solid var(--aura-purple);"><img id="prof-pfp" src=""></div>
            <h3 id="prof-name" style="font-size:22px; margin-top:20px;">AURA ONE</h3>
            <p id="prof-acc" style="color:rgba(255,255,255,0.4); font-size:14px;">@user</p>
        </div>
        <button class="commit-btn" style="background:rgba(255,94,94,0.15); color:var(--down); border:1px solid var(--down);" onclick="hardReset()">ERASE ALL ACCOUNT DATA</button>
        <button class="commit-btn" style="background:var(--glass); margin-top:auto;" onclick="toggleProfile()">RETURN</button>
    </div>

    <div class="footer">
        <div class="nav-item active" style="color:var(--aura-cyan)"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-item nav-special"><i class="fa-solid fa-dollar-sign"></i></div>
        <div class="nav-item"><i class="fa-solid fa-repeat"></i></div>
        <div class="nav-item" onclick="toggleProfile()"><i class="fa-solid fa-user-gear"></i></div>
    </div>
</div>

<script>
    const DEFAULT_PFP = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PGcgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjODE1YmY1IiBzdHJva2Utd2lkdGg9IjEuNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48Y2lyY2xlIGN4PSIxMiIgY3k9IjgiIHI9IjQiLz48cGF0aCBkPSJNNSAyMGMwLTIuMiAxLjgtNCA0LTRoNmMyLjIgMCA0IDEuOCA0IDQiLz48L2c+PC9zdmc+`;
    const icons = { bitcoin: "https://assets.coingecko.com/coins/images/1/large/bitcoin.png", ethereum: "https://assets.coingecko.com/coins/images/279/large/ethereum.png", solana: "https://assets.coingecko.com/coins/images/4128/large/solana.png" };
    
    let market = [
        { id: "bitcoin", sym: "BTC", bal: 0, price: 0, change: 0 },
        { id: "ethereum", sym: "ETH", bal: 0, price: 0, change: 0 },
        { id: "solana", sym: "SOL", bal: 0, price: 0, change: 0 }
    ];

    const fmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    let currentInput = "", lastPFPBase64 = null;
    let startY = 0, pulling = false;

    const getSaved = () => JSON.parse(localStorage.getItem('AURA_FINAL_STORAGE')) || {};
    const saveToStorage = (obj) => localStorage.setItem('AURA_FINAL_STORAGE', JSON.stringify({...getSaved(), ...obj}));

    function pressKey(key) {
        if(key === 'del') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 4) currentInput += key;
        updateDots();
        if(currentInput.length === 4) {
            const stored = getSaved().pin;
            if(!stored) { saveToStorage({pin: currentInput}); unlock(); }
            else if(currentInput === stored) unlock();
            else { currentInput = ""; setTimeout(updateDots, 200); }
        }
    }

    function updateDots() { document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('filled', i < currentInput.length)); }
    function unlock() { document.getElementById('lock-screen').style.transform = "translateY(-100%)"; updateMarket(); }

    window.onload = boot;

    function boot() {
        const s = getSaved();
        lastPFPBase64 = s.pfp || null;
        document.getElementById('user-pfp').src = lastPFPBase64 || DEFAULT_PFP;
        document.getElementById('prof-pfp').src = lastPFPBase64 || DEFAULT_PFP;
        document.getElementById('disp-name').innerText = (s.name || "AURA ONE").toUpperCase();
        document.getElementById('prof-name').innerText = (s.name || "AURA ONE").toUpperCase();
        document.getElementById('disp-acc').innerText = s.acc || "@user";
        document.getElementById('prof-acc').innerText = s.acc || "@user";
        
        document.getElementById('adm-name').value = s.name || "";
        document.getElementById('adm-acc').value = s.acc || "";
        document.getElementById('adm-btc').value = s.btc || "";
        document.getElementById('adm-eth').value = s.eth || "";
        document.getElementById('adm-sol').value = s.sol || "";
    }

    function handlePFPSelection(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 150; canvas.height = 150;
                ctx.drawImage(img, 0, 0, 150, 150);
                lastPFPBase64 = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('upload-status').innerText = "✓ PHOTO READY";
                document.getElementById('user-pfp').src = lastPFPBase64;
                document.getElementById('prof-pfp').src = lastPFPBase64;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function applyChanges() {
        saveToStorage({
            name: document.getElementById('adm-name').value,
            acc: document.getElementById('adm-acc').value,
            pfp: lastPFPBase64,
            btc: parseFloat(document.getElementById('adm-btc').value) || 0,
            eth: parseFloat(document.getElementById('adm-eth').value) || 0,
            sol: parseFloat(document.getElementById('adm-sol').value) || 0
        });
        boot(); closeAdmin(); updateMarket();
    }

    async function updateMarket() {
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana`);
            const data = await res.json();
            const s = getSaved();
            market.forEach(m => {
                const live = data.find(d => d.id === m.id);
                m.price = live.current_price;
                m.change = live.price_change_percentage_24h;
                m.bal = s[m.sym.toLowerCase()] || 0;
            });
            render();
        } catch(e) {}
    }

    function render() {
        const container = document.getElementById('asset-container');
        container.innerHTML = '';
        let total = 0, totalPNL = 0;

        market.forEach(m => {
            const fiat = m.bal * m.price;
            const pnl = fiat * (m.change/100);
            total += fiat; totalPNL += pnl;
            const isUp = m.change >= 0;

            container.innerHTML += `
                <div class="asset-card">
                    <div style="display:flex; align-items:center; gap:15px">
                        <div class="logo-box"><img src="${icons[m.id]}"></div>
                        <div>
                            <div style="font-weight:800; font-size:16px">${m.sym}</div>
                            <div style="color:rgba(255,255,255,0.3); font-size:11px">${m.bal} ${m.sym}</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:800; font-size:16px">$${fmt.format(fiat)}</div>
                        <div style="color:${isUp?'var(--up)':'var(--down)'}; font-size:11px; font-weight:700">${isUp?'+':''}${m.change.toFixed(2)}%</div>
                    </div>
                </div>
            `;
        });

        document.getElementById('main-val').innerText = "$" + fmt.format(total);
        const pnlEl = document.getElementById('pnl-summary');
        pnlEl.style.color = totalPNL >= 0 ? 'var(--up)' : 'var(--down)';
        pnlEl.innerText = (totalPNL >= 0 ? '+' : '-') + "$" + fmt.format(Math.abs(totalPNL)) + " (24h)";
    }

    /* GESTURE ENGINE (PULL TO REFRESH) */
    const scrollEl = document.getElementById('main-scroll');
    const pullInd = document.getElementById('pull-indicator');

    scrollEl.addEventListener('touchstart', e => {
        if(scrollEl.scrollTop === 0) {
            startY = e.touches[0].pageY;
            pulling = true;
        }
    }, {passive: true});

    scrollEl.addEventListener('touchmove', e => {
        if(!pulling) return;
        const currentY = e.touches[0].pageY;
        const diff = currentY - startY;

        if(diff > 0) {
            const move = Math.min(diff / 2.5, 80);
            scrollEl.style.transform = `translateY(${move}px)`;
            pullInd.style.opacity = move / 60;
            pullInd.style.transform = `translateX(-50%) scale(${move/40}) rotate(${diff}deg)`;
        }
    }, {passive: true});

    scrollEl.addEventListener('touchend', () => {
        if(!pulling) return;
        const currentTransform = new WebKitCSSMatrix(window.getComputedStyle(scrollEl).transform).m42;
        
        if(currentTransform >= 60) {
            pullInd.classList.add('spinning');
            updateMarket().then(() => {
                setTimeout(() => {
                    resetScroll();
                    pullInd.classList.remove('spinning');
                }, 800);
            });
        } else {
            resetScroll();
        }
        pulling = false;
    });

    function resetScroll() {
        scrollEl.style.transform = `translateY(0)`;
        pullInd.style.opacity = 0;
        pullInd.style.transform = `translateX(-50%) scale(0)`;
    }

    function toggleSearch() { 
        const s = document.getElementById('search-wrapper'); 
        s.style.maxHeight = s.style.maxHeight === "0px" ? "100px" : "0px";
        s.style.opacity = s.style.opacity === "0" ? "1" : "0";
    }
    function checkSecret() { if(document.getElementById('asset-search').value === "123") { document.getElementById('admin-modal').classList.add('open'); document.getElementById('asset-search').value = ""; toggleSearch(); } }
    function closeAdmin() { document.getElementById('admin-modal').classList.remove('open'); }
    function toggleProfile() { document.getElementById('profile-modal').classList.toggle('open'); }
    function hardReset() { if(confirm("This will erase all data. Continue?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
