<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --aura-purple: #815bf5; --aura-cyan: #00ffa3; --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --up: #00ffa3; --down: #ff5e5e;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            background: var(--bg-deep); 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; overflow: hidden;
        }

        /* FUNDAL FIX CARE PARERE INFINIT */
        .aurora-bg { 
            position: fixed; inset: 0; z-index: 0; 
            background: radial-gradient(circle at 10% 10%, rgba(129, 91, 245, 0.1) 0%, transparent 40%), 
                        radial-gradient(circle at 90% 90%, rgba(0, 255, 163, 0.06) 0%, transparent 40%); 
            background-color: var(--bg-deep);
        }

        .app-container { width: 100%; height: 100dvh; position: relative; display: flex; flex-direction: column; z-index: 1; }

        #pull-indicator { 
            position: absolute; top: calc(50px + var(--safe-top)); left: 50%; 
            transform: translateX(-50%) scale(0); width: 35px; height: 35px; 
            background: var(--aura-purple); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; 
        }
        .spinning i { animation: rotate-icon 0.8s linear infinite; }
        @keyframes rotate-icon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #lock-screen { position: fixed; inset: 0; background: #030305; z-index: 2100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* PACALEALA PENTRU LUNGIME */
        .scroll-view { 
            flex: 1; overflow-y: auto; 
            padding: calc(60px + var(--safe-top)) 22px calc(150px + var(--safe-bottom)); 
            scrollbar-width: none; transition: transform 0.2s;
            min-height: 120vh; /* Fortam inaltimea mai mare decat ecranul */
        }

        .brand-header { text-align: center; margin-bottom: 25px; }
        .pfp-wrap { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--glass-border); margin: 0 auto 12px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        #user-pfp, #prof-pfp { width: 100%; height: 100%; object-fit: cover; }
        
        .amount-display { font-weight: 800; font-size: 42px; text-align: center; letter-spacing: -1.5px; }
        #pnl-summary { font-size: 14px; font-weight: 700; text-align: center; margin: 8px 0 30px; min-height: 20px; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 35px; }
        .action-btn { background: var(--glass); border-radius: 20px; border: 1px solid var(--glass-border); height: 56px; display: flex; align-items: center; justify-content: center; color: var(--aura-cyan); font-size: 18px; }

        /* TOKENS SECTION */
        #token-wrapper { opacity: 1; }
        .tokens-title { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.2); letter-spacing: 1.5px; text-transform: uppercase; margin: 0 0 15px 5px; }
        .asset-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 16px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); }
        .logo-box img { width: 24px; height: 24px; }
        .pct-pill { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; color: #000; margin-left: 6px; }

        .view-more { width: 100%; text-align: center; padding: 15px; font-size: 12px; font-weight: 700; color: var(--aura-purple); }

        /* FOOTER */
        .footer { 
            position: fixed; bottom: 0; width: 100%; 
            height: calc(80px + var(--safe-bottom)); 
            background: rgba(5, 5, 8, 0.98); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: flex-start; 
            border-top: 1px solid var(--glass-border); padding-top: 15px;
            padding-bottom: var(--safe-bottom); z-index: 100; 
        }
        .nav-item { color: rgba(255,255,255,0.2); font-size: 20px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .nav-special { color: #000; background: #fff; width: 52px; height: 52px; transform: translateY(-15px) rotate(45deg); border-radius: 14px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg-deep); }
        .nav-special i { transform: rotate(-45deg); }

        .dot { width: 12px; height: 12px; border: 2px solid var(--glass-border); border-radius: 50%; margin: 0 8px; }
        .dot.filled { background: var(--aura-purple); border-color: var(--aura-purple); }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .pin-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--glass); color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="aurora-bg"></div>

<div class="app-container">
    <div id="pull-indicator"><i class="fa-solid fa-rotate"></i></div>

    <div id="lock-screen">
        <div style="margin-bottom:30px; font-weight:700; color:rgba(255,255,255,0.5)">ENTER PIN</div>
        <div style="display:flex; margin-bottom:50px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pin-pad">
            <div class="pin-btn" onclick="pressKey('1')">1</div><div class="pin-btn" onclick="pressKey('2')">2</div><div class="pin-btn" onclick="pressKey('3')">3</div>
            <div class="pin-btn" onclick="pressKey('4')">4</div><div class="pin-btn" onclick="pressKey('5')">5</div><div class="pin-btn" onclick="pressKey('6')">6</div>
            <div class="pin-btn" onclick="pressKey('7')">7</div><div class="pin-btn" onclick="pressKey('8')">8</div><div class="pin-btn" onclick="pressKey('9')">9</div>
            <div style="width:70px"></div><div class="pin-btn" onclick="pressKey('0')">0</div><div class="pin-btn" onclick="pressKey('del')"><i class="fa-solid fa-delete-left"></i></div>
        </div>
    </div>

    <div class="scroll-view" id="main-scroll">
        <div class="brand-header">
            <div class="pfp-wrap"><img id="user-pfp" src=""></div>
            <div id="disp-name" style="font-weight:800; font-size:15px">AURA ONE</div>
            <div id="disp-acc" style="color:rgba(255,255,255,0.4); font-size:11px">@user</div>
        </div>
        
        <div class="amount-display" id="main-val">$0.00</div>
        <div id="pnl-summary"></div>

        <div id="search-wrapper" style="max-height:0; opacity:0; overflow:hidden; transition:0.4s; margin-bottom:20px;">
            <input type="text" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:15px; color:var(--aura-cyan);" id="asset-search" placeholder="Code..." oninput="checkSecret()">
        </div>

        <div class="action-grid">
            <div class="action-btn"><i class="fa-solid fa-paper-plane"></i></div>
            <div class="action-btn"><i class="fa-solid fa-qrcode"></i></div>
            <div class="action-btn"><i class="fa-solid fa-rotate"></i></div>
            <div class="action-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>

        <div id="token-wrapper">
            <div class="tokens-title">Tokens</div>
            <div id="asset-container"></div>
            <div class="view-more">View More Tokens</div>
        </div>
    </div>

    <div id="admin-modal" class="slide-modal" style="position:fixed; inset:0; background:#030305; z-index:2500; transform:translateY(100%); transition:0.5s; padding:60px 25px; display:flex; flex-direction:column;">
        <h2 style="color:var(--aura-purple); margin-bottom:20px;">Console</h2>
        <input type="text" id="adm-name" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:15px; color:white; margin-bottom:10px;" placeholder="Name">
        <input type="text" id="adm-acc" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:15px; color:white; margin-bottom:10px;" placeholder="@handle">
        <input type="number" id="adm-btc" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:15px; color:white; margin-bottom:10px;" placeholder="BTC">
        <input type="number" id="adm-eth" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:15px; color:white; margin-bottom:10px;" placeholder="ETH">
        <input type="number" id="adm-sol" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); border-radius:15px; color:white; margin-bottom:20px;" placeholder="SOL">
        <button class="commit-btn" onclick="applyChanges()" style="padding:20px; background:var(--aura-purple); border:none; border-radius:15px; color:white; font-weight:800;">SAVE</button>
        <button onclick="closeAdmin()" style="margin-top:10px; background:none; border:none; color:rgba(255,255,255,0.4);">Cancel</button>
    </div>

    <div id="profile-modal" class="slide-modal" style="position:fixed; inset:0; background:#030305; z-index:2500; transform:translateY(100%); transition:0.5s; padding:60px 25px;">
        <h2 style="text-align:center">Account</h2>
        <button class="commit-btn" style="width:100%; padding:20px; background:rgba(255,94,94,0.1); border:1px solid var(--down); color:var(--down); border-radius:15px;" onclick="hardReset()">ERASE DATA</button>
        <button onclick="toggleProfile()" style="width:100%; margin-top:20px; background:var(--glass); border:none; padding:20px; border-radius:15px; color:white;">BACK</button>
    </div>

    <div class="footer">
        <div class="nav-item" style="color:var(--aura-cyan)"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-item nav-special"><i class="fa-solid fa-dollar-sign"></i></div>
        <div class="nav-item"><i class="fa-solid fa-repeat"></i></div>
        <div class="nav-item" onclick="toggleProfile()"><i class="fa-solid fa-user-gear"></i></div>
    </div>
</div>

<script>
    const DEFAULT_PFP = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PGcgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjODE1YmY1IiBzdHJva2Utd2lkdGg9IjEuNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48Y2lyY2xlIGN4PSIxMiIgY3k9IjgiIHI9IjQiLz48cGF0aCBkPSJNNSAyMGMwLTIuMiAxLjgtNCA0LTRoNmMyLjIgMCA0IDEuOCA0IDQiLz48L2c+PC9zdmc+`;
    const icons = { bitcoin: "https://assets.coingecko.com/coins/images/1/large/bitcoin.png", ethereum: "https://assets.coingecko.com/coins/images/279/large/ethereum.png", solana: "https://assets.coingecko.com/coins/images/4128/large/solana.png" };
    let market = [{id:"bitcoin",sym:"BTC",bal:0,price:0,change:0},{id:"ethereum",sym:"ETH",bal:0,price:0,change:0},{id:"solana",sym:"SOL",bal:0,price:0,change:0}];
    const fmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    let currentInput = "", lastPFPBase64 = null, startY = 0, pulling = false;

    const getSaved = () => JSON.parse(localStorage.getItem('AURA_V58_STORE')) || {};
    const saveToStorage = (obj) => localStorage.setItem('AURA_V58_STORE', JSON.stringify({...getSaved(), ...obj}));

    function pressKey(key) {
        if(key==='del') currentInput = currentInput.slice(0,-1);
        else if(currentInput.length < 4) currentInput += key;
        document.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('filled', i < currentInput.length));
        if(currentInput.length === 4) {
            const stored = getSaved().pin;
            if(!stored) { saveToStorage({pin: currentInput}); unlock(); }
            else if(currentInput === stored) unlock();
            else { currentInput = ""; document.querySelectorAll('.dot').forEach(d=>d.classList.remove('filled')); }
        }
    }

    function unlock() { document.getElementById('lock-screen').style.transform = "translateY(-100%)"; updateMarket(); }
    window.onload = () => { if(!getSaved().pin) unlock(); boot(); };

    function boot() {
        const s = getSaved();
        document.getElementById('user-pfp').src = s.pfp || DEFAULT_PFP;
        document.getElementById('prof-pfp').src = s.pfp || DEFAULT_PFP;
        document.getElementById('disp-name').innerText = (s.name || "AURA ONE").toUpperCase();
        document.getElementById('adm-name').value = s.name || "";
        document.getElementById('adm-acc').value = s.acc || "";
        document.getElementById('adm-btc').value = s.btc || "";
        document.getElementById('adm-eth').value = s.eth || "";
        document.getElementById('adm-sol').value = s.sol || "";
        render(); // Force initial render
    }

    function applyChanges() {
        saveToStorage({
            name: document.getElementById('adm-name').value,
            acc: document.getElementById('adm-acc').value,
            btc: parseFloat(document.getElementById('adm-btc').value) || 0,
            eth: parseFloat(document.getElementById('adm-eth').value) || 0,
            sol: parseFloat(document.getElementById('adm-sol').value) || 0
        });
        boot(); closeAdmin(); updateMarket();
    }

    async function updateMarket() {
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana`);
            const data = await res.json();
            const s = getSaved();
            market.forEach(m => {
                const live = data.find(d => d.id === m.id);
                m.price = live.current_price; m.change = live.price_change_percentage_24h;
                m.bal = s[m.sym.toLowerCase()] || 0;
            });
            render();
        } catch(e) { render(); }
    }

    function render() {
        const container = document.getElementById('asset-container');
        container.innerHTML = '';
        let total = 0, totalPNL = 0;
        const s = getSaved();
        
        market.forEach(m => {
            m.bal = s[m.sym.toLowerCase()] || 0;
            const fiat = m.bal * m.price; const pnl = fiat * (m.change/100);
            total += fiat; totalPNL += pnl;
            const isUp = m.change >= 0;
            container.innerHTML += `<div class="asset-card"><div style="display:flex; align-items:center; gap:12px"><div class="logo-box"><img src="${icons[m.id]}"></div><div><div style="font-weight:800; font-size:16px">${m.sym}</div><div style="color:rgba(255,255,255,0.3); font-size:11px">${m.bal} ${m.sym}</div></div></div><div style="text-align:right"><div style="font-weight:800; font-size:16px">$${fmt.format(fiat)}</div><div style="color:${isUp?'var(--up)':'var(--down)'}; font-size:11px; font-weight:700">${isUp?'+':''}${m.change.toFixed(2)}%</div></div></div>`;
        });
        document.getElementById('main-val').innerText = "$" + fmt.format(total);
        const pnlEl = document.getElementById('pnl-summary');
        pnlEl.style.color = totalPNL >= 0 ? 'var(--up)' : 'var(--down)';
        pnlEl.innerText = (totalPNL >= 0 ? '+' : '-') + "$" + fmt.format(Math.abs(totalPNL)) + " (24h)";
    }

    const sc = document.getElementById('main-scroll'), pi = document.getElementById('pull-indicator');
    sc.addEventListener('touchstart', e => { if(sc.scrollTop <= 0) { startY = e.touches[0].pageY; pulling = true; } }, {passive: true});
    sc.addEventListener('touchmove', e => {
        if(!pulling) return;
        const diff = e.touches[0].pageY - startY;
        if(diff > 0) {
            const move = Math.min(diff / 2.5, 70);
            sc.style.transform = `translateY(${move}px)`;
            pi.style.opacity = move / 50; pi.style.transform = `translateX(-50%) scale(${move/40})`;
        }
    }, {passive: true});
    sc.addEventListener('touchend', () => {
        if(!pulling) return;
        if(new WebKitCSSMatrix(window.getComputedStyle(sc).transform).m42 >= 40) {
            pi.classList.add('spinning'); updateMarket().then(() => { setTimeout(() => { sc.style.transform = 'translateY(0)'; pi.style.opacity = 0; pi.classList.remove('spinning'); }, 800); });
        } else { sc.style.transform = 'translateY(0)'; pi.style.opacity = 0; }
        pulling = false;
    });

    function toggleSearch() { const s = document.getElementById('search-wrapper'); s.style.maxHeight = s.style.maxHeight === "0px" ? "100px" : "0px"; s.style.opacity = s.style.opacity === "0" ? "1" : "0"; }
    function checkSecret() { if(document.getElementById('asset-search').value === "123") { document.getElementById('admin-modal').style.transform = "translateY(0)"; document.getElementById('asset-search').value = ""; toggleSearch(); } }
    function closeAdmin() { document.getElementById('admin-modal').style.transform = "translateY(100%)"; }
    function toggleProfile() { const m = document.getElementById('profile-modal'); m.style.transform = m.style.transform === "translateY(0px)" ? "translateY(100%)" : "translateY(0px)"; }
    function hardReset() { if(confirm("Erase all data?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
