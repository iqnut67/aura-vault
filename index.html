<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --aura-purple: #815bf5; --aura-cyan: #00ffa3; --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --up: #00ffa3; --down: #ff5e5e;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: #000; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; overflow: hidden;
        }

        /* Fundalul care acopera tot */
        .app-shell {
            position: fixed; inset: 0;
            background: var(--bg-deep);
            z-index: 1; display: flex; flex-direction: column;
        }

        .aurora-bg { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 10% 10%, rgba(129, 91, 245, 0.1) 0%, transparent 40%), 
                        radial-gradient(circle at 90% 90%, rgba(0, 255, 163, 0.06) 0%, transparent 40%); 
            z-index: -1;
        }

        /* REFRESH INDICATOR */
        #pull-indicator { 
            position: absolute; top: calc(40px + var(--safe-top)); left: 50%; 
            transform: translateX(-50%) scale(0); width: 35px; height: 35px; 
            background: var(--aura-purple); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0;
        }
        .spinning i { animation: rotate-icon 0.8s linear infinite; }
        @keyframes rotate-icon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SCROLL VIEW */
        .scroll-view { 
            flex: 1; overflow-y: auto; 
            padding: calc(60px + var(--safe-top)) 22px calc(100px + var(--safe-bottom)); 
            scrollbar-width: none; z-index: 2;
            transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        /* UI ELEMENTS */
        .brand-header { text-align: center; margin-bottom: 25px; }
        .pfp-wrap { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--glass-border); margin: 0 auto 12px; overflow: hidden; background: #111; }
        #user-pfp { width: 100%; height: 100%; object-fit: cover; }
        
        .amount-display { font-weight: 800; font-size: 48px; text-align: center; letter-spacing: -2px; margin: 10px 0; }
        #pnl-summary { font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 35px; min-height: 20px; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 40px; }
        .action-btn { background: var(--glass); border-radius: 20px; border: 1px solid var(--glass-border); height: 62px; display: flex; align-items: center; justify-content: center; color: var(--aura-cyan); font-size: 20px; }

        .asset-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 18px; border-radius: 26px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        /* FOOTER FIX JOS DE TOT */
        .footer { 
            position: fixed; bottom: 0; width: 100%; 
            height: calc(75px + var(--safe-bottom)); 
            background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; align-items: flex-start; 
            border-top: 1px solid var(--glass-border); padding-top: 15px; z-index: 100; 
        }
        .nav-item { color: rgba(255,255,255,0.2); font-size: 22px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .nav-special { color: #000; background: #fff; width: 55px; height: 55px; transform: translateY(-20px) rotate(45deg); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 4px solid #000; }
        .nav-special i { transform: rotate(-45deg); }

        /* LOCK & MODALS */
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-modal { position: fixed; inset: 0; background: #030305; z-index: 2500; transform: translateY(100%); transition: 0.5s; padding: calc(50px + var(--safe-top)) 25px var(--safe-bottom); display: flex; flex-direction: column; }
        .slide-modal.open { transform: translateY(0); }
        
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .pin-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; font-size: 28px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
        .dot { width: 14px; height: 14px; border: 2px solid var(--glass-border); border-radius: 50%; margin: 0 8px; }
        .dot.filled { background: var(--aura-purple); border-color: var(--aura-purple); }

        .adm-input { width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 18px; color: var(--aura-cyan); font-family: inherit; margin-bottom: 15px; }
        .commit-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--aura-purple), #a885ff); border: none; border-radius: 20px; color: white; font-weight: 800; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="aurora-bg"></div>
    <div id="pull-indicator"><i class="fa-solid fa-rotate"></i></div>

    <div id="lock-screen">
        <div id="lock-title" style="margin-bottom:40px; font-weight:700;">ENTER PIN</div>
        <div style="display:flex; margin-bottom:60px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pin-pad">
            <div class="pin-btn" onclick="press('1')">1</div><div class="pin-btn" onclick="press('2')">2</div><div class="pin-btn" onclick="press('3')">3</div>
            <div class="pin-btn" onclick="press('4')">4</div><div class="pin-btn" onclick="press('5')">5</div><div class="pin-btn" onclick="press('6')">6</div>
            <div class="pin-btn" onclick="press('7')">7</div><div class="pin-btn" onclick="press('8')">8</div><div class="pin-btn" onclick="press('9')">9</div>
            <div style="width:75px"></div><div class="pin-btn" onclick="press('0')">0</div><div class="pin-btn" onclick="press('del')"><i class="fa-solid fa-delete-left"></i></div>
        </div>
    </div>

    <div class="scroll-view" id="main-scroll">
        <div class="brand-header">
            <div class="pfp-wrap"><img id="user-pfp" src=""></div>
            <div id="disp-name" style="font-weight:800;">AURA ONE</div>
            <div id="disp-acc" style="color:rgba(255,255,255,0.4); font-size:12px;">@user</div>
        </div>
        
        <div class="amount-display" id="main-val">$0.00</div>
        <div id="pnl-summary"></div>

        <div id="search-wrapper" style="max-height:0; opacity:0; overflow:hidden; transition:0.4s; margin-bottom:15px;">
            <input type="text" class="adm-input" id="asset-search" placeholder="Secret Code..." oninput="checkSecret()">
        </div>

        <div class="action-grid">
            <div class="action-btn"><i class="fa-solid fa-paper-plane"></i></div>
            <div class="action-btn"><i class="fa-solid fa-qrcode"></i></div>
            <div class="action-btn"><i class="fa-solid fa-rotate"></i></div>
            <div class="action-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>

        <div id="asset-container"></div>
    </div>

    <div id="admin-modal" class="slide-modal">
        <h2 style="color:var(--aura-purple);">System</h2>
        <input type="text" id="adm-name" class="adm-input" placeholder="Name">
        <input type="text" id="adm-acc" class="adm-input" placeholder="@handle">
        <div style="padding:15px; border:1px dashed var(--glass-border); border-radius:15px; text-align:center; position:relative; margin-bottom:20px;">
            <span id="pfp-status">Change PFP</span>
            <input type="file" id="adm-pfp" accept="image/*" onchange="handlePFP(event)" style="position:absolute; inset:0; opacity:0;">
        </div>
        <input type="number" id="adm-btc" class="adm-input" placeholder="BTC Units">
        <input type="number" id="adm-eth" class="adm-input" placeholder="ETH Units">
        <input type="number" id="adm-sol" class="adm-input" placeholder="SOL Units">
        <button class="commit-btn" onclick="save()">COMMIT CHANGES</button>
        <button class="commit-btn" style="background:var(--glass); margin-top:10px;" onclick="closeAdmin()">CLOSE</button>
    </div>

    <div class="footer">
        <div class="nav-item"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-item nav-special"><i class="fa-solid fa-dollar-sign"></i></div>
        <div class="nav-item"><i class="fa-solid fa-repeat"></i></div>
        <div class="nav-item" onclick="document.getElementById('admin-modal').classList.add('open')"><i class="fa-solid fa-user-gear"></i></div>
    </div>
</div>

<script>
    const icons = { bitcoin: "https://assets.coingecko.com/coins/images/1/large/bitcoin.png", ethereum: "https://assets.coingecko.com/coins/images/279/large/ethereum.png", solana: "https://assets.coingecko.com/coins/images/4128/large/solana.png" };
    const fmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    let input = "", lastPFP = null, startY = 0, pulling = false;

    const getS = () => JSON.parse(localStorage.getItem('AURA_V57_STORE')) || {};
    const setS = (obj) => localStorage.setItem('AURA_V57_STORE', JSON.stringify({...getS(), ...obj}));

    function press(key) {
        if(key === 'del') input = input.slice(0, -1);
        else if(input.length < 4) input += key;
        updateDots();
        if(input.length === 4) {
            const s = getS();
            if(!s.pin) { setS({pin: input}); unlock(); }
            else if(input === s.pin) unlock();
            else { input = ""; updateDots(); }
        }
    }
    function updateDots() { document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('filled', i < input.length)); }
    function unlock() { document.getElementById('lock-screen').style.transform = "translateY(-100%)"; updateMarket(); }

    window.onload = boot;

    function boot() {
        const s = getS();
        document.getElementById('user-pfp').src = s.pfp || "";
        document.getElementById('disp-name').innerText = s.name || "AURA ONE";
        document.getElementById('disp-acc').innerText = s.acc || "@user";
        document.getElementById('adm-name').value = s.name || "";
        document.getElementById('adm-acc').value = s.acc || "";
        document.getElementById('adm-btc').value = s.btc || "";
        document.getElementById('adm-eth').value = s.eth || "";
        document.getElementById('adm-sol').value = s.sol || "";
    }

    function handlePFP(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = 150; canvas.height = 150;
                canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                lastPFP = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('pfp-status').innerText = "✓ READY";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function save() {
        setS({
            name: document.getElementById('adm-name').value,
            acc: document.getElementById('adm-acc').value,
            pfp: lastPFP || getS().pfp,
            btc: parseFloat(document.getElementById('adm-btc').value) || 0,
            eth: parseFloat(document.getElementById('adm-eth').value) || 0,
            sol: parseFloat(document.getElementById('adm-sol').value) || 0
        });
        location.reload();
    }

    async function updateMarket() {
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana`);
            const data = await res.json();
            const s = getS();
            const container = document.getElementById('asset-container');
            container.innerHTML = '';
            let total = 0, totalPNL = 0;

            const assets = [
                { id: "bitcoin", sym: "BTC", bal: s.btc || 0 },
                { id: "ethereum", sym: "ETH", bal: s.eth || 0 },
                { id: "solana", sym: "SOL", bal: s.sol || 0 }
            ];

            assets.forEach(m => {
                const live = data.find(d => d.id === m.id);
                const fiat = m.bal * live.current_price;
                const pnl = fiat * (live.price_change_percentage_24h/100);
                total += fiat; totalPNL += pnl;
                const isUp = live.price_change_percentage_24h >= 0;

                container.innerHTML += `
                    <div class="asset-card">
                        <div style="display:flex; align-items:center; gap:12px">
                            <div class="logo-box"><img src="${icons[m.id]}"></div>
                            <div><b>${m.sym}</b><br><span style="color:rgba(255,255,255,0.3); font-size:11px">${m.bal} ${m.sym}</span></div>
                        </div>
                        <div style="text-align:right"><b>$${fmt.format(fiat)}</b><br><span style="color:${isUp?'var(--up)':'var(--down)'}; font-size:11px">${isUp?'+':''}${live.price_change_percentage_24h.toFixed(2)}%</span></div>
                    </div>`;
            });

            document.getElementById('main-val').innerText = "$" + fmt.format(total);
            const pnlEl = document.getElementById('pnl-summary');
            pnlEl.style.color = totalPNL >= 0 ? 'var(--up)' : 'var(--down)';
            pnlEl.innerText = (totalPNL >= 0 ? '+' : '-') + "$" + fmt.format(Math.abs(totalPNL)) + " (24h)";
        } catch(e) {}
    }

    /* GESTURES */
    const scrollEl = document.getElementById('main-scroll');
    const pullInd = document.getElementById('pull-indicator');

    scrollEl.addEventListener('touchstart', e => { if(scrollEl.scrollTop === 0) { startY = e.touches[0].pageY; pulling = true; } }, {passive: true});
    scrollEl.addEventListener('touchmove', e => {
        if(!pulling) return;
        const diff = e.touches[0].pageY - startY;
        if(diff > 0) {
            const move = Math.min(diff / 2, 80);
            scrollEl.style.transform = `translateY(${move}px)`;
            pullInd.style.opacity = move / 60;
            pullInd.style.transform = `translateX(-50%) scale(${move/40})`;
        }
    }, {passive: true});
    scrollEl.addEventListener('touchend', () => {
        const matrix = new WebKitCSSMatrix(window.getComputedStyle(scrollEl).transform);
        if(matrix.m42 >= 60) {
            pullInd.classList.add('spinning');
            updateMarket().then(() => { setTimeout(() => { reset(); pullInd.classList.remove('spinning'); }, 800); });
        } else reset();
        pulling = false;
    });
    function reset() { scrollEl.style.transform = `translateY(0)`; pullInd.style.opacity = 0; pullInd.style.transform = `translateX(-50%) scale(0)`; }
    function closeAdmin() { document.getElementById('admin-modal').classList.remove('open'); }
    function toggleSearch() { const s = document.getElementById('search-wrapper'); s.style.maxHeight = s.style.maxHeight === "0px" ? "100px" : "0px"; s.style.opacity = s.style.opacity === "0" ? "1" : "0"; }
    function checkSecret() { if(document.getElementById('asset-search').value === "123") { document.getElementById('asset-search').value = ""; toggleSearch(); document.getElementById('admin-modal').classList.add('open'); } }
</script>
</body>
</html>
