<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Aura Ultra Pro - V54 Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --aura-purple: #815bf5; --aura-cyan: #00ffa3; --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --up: #00ffa3; --down: #ff5e5e;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-deep); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .aurora-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(circle at 10% 10%, rgba(129, 91, 245, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(0, 255, 163, 0.06) 0%, transparent 40%); }
        .phone { width: 375px; height: 812px; background: rgba(8, 8, 12, 0.85); border-radius: 54px; position: relative; overflow: hidden; border: 1px solid var(--glass-border); backdrop-filter: blur(40px); box-shadow: 0 40px 120px rgba(0,0,0,0.9); display: flex; flex-direction: column; z-index: 1; }
        
        #lock-screen { position: absolute; inset: 0; background: #030305; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .pin-title { font-size: 18px; font-weight: 700; margin-bottom: 30px; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 50px; }
        .dot { width: 14px; height: 14px; border: 2px solid var(--glass-border); border-radius: 50%; transition: 0.2s; }
        .dot.filled { background: var(--aura-purple); border-color: var(--aura-purple); }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 260px; }
        .pin-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--glass); border: 1px solid var(--glass-border); color: #fff; font-size: 24px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }

        #custom-alert { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(10px); }
        .alert-box { background: #0d0d12; border: 1px solid var(--glass-border); padding: 30px; border-radius: 32px; width: 100%; text-align: center; }
        .alert-btn-red { width: 100%; padding: 16px; background: var(--down); border: none; border-radius: 18px; color: white; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .alert-btn-cancel { width: 100%; padding: 16px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; color: white; font-weight: 800; cursor: pointer; }

        #pull-indicator { position: absolute; top: 40px; left: 50%; transform: translateX(-50%) scale(0); width: 32px; height: 32px; background: var(--aura-purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: 0.2s; }
        .spinning i { animation: rotate-icon 0.8s linear infinite; }
        @keyframes rotate-icon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .scroll-view { flex: 1; overflow-y: auto; padding: 70px 22px 100px; scrollbar-width: none; position: relative; }

        .brand-header { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .pfp-wrap { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--glass-border); margin-bottom: 10px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        #user-pfp, #prof-pfp { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        .amount-display { font-weight: 800; letter-spacing: -1.5px; background: linear-gradient(to bottom, #fff 70%, rgba(255,255,255,0.6)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 40px; text-align: center; min-height: 50px; }
        #pnl-summary { font-size: 14px; margin-top: 6px; font-weight: 700; height: 20px; text-align: center; opacity: 1; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 25px 0 35px; }
        .action-btn { background: var(--glass); border-radius: 18px; border: 1px solid var(--glass-border); height: 54px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--aura-cyan); font-size: 17px; }

        #token-wrapper { opacity: 1; transition: 0.5s ease; margin-top: -15px; }
        .tokens-title { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.2); letter-spacing: 1.5px; text-transform: uppercase; margin: 0 0 15px 5px; }
        .asset-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 16px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); }
        .logo-box img { width: 24px; height: 24px; }
        .pct-pill { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; color: #000; margin-left: 6px; }
        .pct-up { background-color: var(--up) !important; }
        .pct-down { background-color: var(--down) !important; }
        .view-more { width: 100%; text-align: center; padding: 12px; font-size: 12px; font-weight: 700; color: var(--aura-purple); cursor: pointer; margin-top: -5px; }

        .slide-modal { position: absolute; inset: 0; background: #030305; z-index: 1500; transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 50px 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .slide-modal.open { transform: translateY(0); }
        .adm-input-group { position: relative; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .adm-input-custom { flex: 1; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 16px; color: var(--aura-cyan); font-family: inherit; outline: none; }
        .adm-input-group i { position: absolute; left: 18px; color: rgba(255,255,255,0.3); font-size: 14px; }
        .force-toggle { background: var(--glass); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 800; min-width: 60px; text-align: center; }
        .commit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--aura-purple), #a885ff); border: none; border-radius: 20px; color: white; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 20px; }

        .footer { position: absolute; bottom: 0; width: 100%; height: 85px; background: rgba(5, 5, 8, 0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass-border); padding-bottom: 15px; z-index: 100; }
        .nav-item { color: rgba(255,255,255,0.2); font-size: 20px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .nav-special { color: #000; background: #fff; width: 52px; height: 52px; transform: translateY(-12px) rotate(45deg); border-radius: 14px; box-shadow: 0 10px 25px rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg-deep); }
        .nav-special i { transform: rotate(-45deg); font-size: 20px; }
    </style>
</head>
<body>

<div class="aurora-bg"></div>

<div class="phone">
    <div id="custom-alert">
        <div class="alert-box">
            <h3 class="alert-title">Are you sure?</h3>
            <p style="font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:25px;">This will erase all data and settings permanently.</p>
            <button class="alert-btn-red" onclick="executeHardReset()">ERASE EVERYTHING</button>
            <button class="alert-btn-cancel" onclick="closeAlert()">CANCEL</button>
        </div>
    </div>

    <div id="lock-screen">
        <div class="pin-title" id="lock-title" style="color:white; font-weight:700;">Enter PIN</div>
        <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pin-pad">
            <div class="pin-btn" onclick="pressKey('1')">1</div><div class="pin-btn" onclick="pressKey('2')">2</div><div class="pin-btn" onclick="pressKey('3')">3</div>
            <div class="pin-btn" onclick="pressKey('4')">4</div><div class="pin-btn" onclick="pressKey('5')">5</div><div class="pin-btn" onclick="pressKey('6')">6</div>
            <div class="pin-btn" onclick="pressKey('7')">7</div><div class="pin-btn" onclick="pressKey('8')">8</div><div class="pin-btn" onclick="pressKey('9')">9</div>
            <div class="pin-btn" style="visibility:hidden"></div><div class="pin-btn" onclick="pressKey('0')">0</div><div class="pin-btn" onclick="pressKey('del')"><i class="fa-solid fa-delete-left"></i></div>
        </div>
        <div style="margin-top:40px; color:rgba(255,255,255,0.2); font-size:12px; cursor:pointer;" onclick="showAlert()">Forgot PIN?</div>
    </div>

    <div id="pull-indicator"><i class="fa-solid fa-rotate"></i></div>

    <div id="admin-modal" class="slide-modal">
        <h2 style="color:var(--aura-purple); margin:0 0 20px;">System Console</h2>
        <div class="adm-input-group"><i class="fa-solid fa-user"></i><input type="text" id="adm-name" class="adm-input-custom" placeholder="Name"></div>
        <div class="adm-input-group"><i class="fa-solid fa-at"></i><input type="text" id="adm-acc" class="adm-input-custom" placeholder="@handle"></div>
        
        <div style="position:relative; width:100%; padding:15px; background:var(--glass); border:1px dashed var(--glass-border); border-radius:15px; text-align:center; color:rgba(255,255,255,0.4); font-size:12px; cursor:pointer;" id="upload-box">
            <span id="upload-status">Upload Profile Picture</span>
            <input type="file" id="adm-pfp-input" accept="image/*" onchange="handlePFPSelection(event)" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
        </div>

        <div style="font-size:10px; color:var(--aura-purple); font-weight:800; margin: 20px 0 10px;">GOD MODE (0 = EMPTY)</div>
        <div class="adm-input-group"><i class="fa-brands fa-bitcoin"></i><input type="number" id="adm-btc" class="adm-input-custom" placeholder="0" step="any"><div class="force-toggle" id="force-btc" onclick="toggleForce('btc')">AUTO</div></div>
        <div class="adm-input-group"><i class="fa-brands fa-ethereum"></i><input type="number" id="adm-eth" class="adm-input-custom" placeholder="0" step="any"><div class="force-toggle" id="force-eth" onclick="toggleForce('eth')">AUTO</div></div>
        <div class="adm-input-group"><i class="fa-solid fa-bolt"></i><input type="number" id="adm-sol" class="adm-input-custom" placeholder="0" step="any"><div class="force-toggle" id="force-sol" onclick="toggleForce('sol')">AUTO</div></div>
        
        <button class="commit-btn" onclick="applyChanges()">COMMIT CHANGES</button>
        <button class="commit-btn" style="background:var(--glass); margin-top:10px;" onclick="closeAdmin()">CANCEL</button>
    </div>

    <div id="profile-modal" class="slide-modal">
        <h2 style="margin-bottom:30px;">Account</h2>
        <div style="text-align:center; margin-bottom:30px; display:flex; flex-direction:column; align-items:center;">
            <div class="pfp-wrap" style="width:75px; height:75px; border:2px solid var(--aura-purple);"><img id="prof-pfp" src=""></div>
            <h3 id="prof-name" style="margin:15px 0 0;">AURA ONE</h3>
            <p id="prof-acc" style="color:rgba(255,255,255,0.4); margin:5px 0;">@user</p>
        </div>
        <button class="commit-btn" style="background:var(--glass); border:1px solid var(--glass-border);" onclick="startPinChange()">CHANGE PIN</button>
        <button class="commit-btn" style="background:rgba(255,94,94,0.1); border:1px solid var(--down); color:var(--down); margin-top:10px;" onclick="showAlert()">ERASE ALL DATA</button>
        <button class="commit-btn" style="background:var(--glass); margin-top:auto;" onclick="toggleProfile()">BACK</button>
    </div>

    <div class="scroll-view" id="main-scroll">
        <div class="brand-header">
            <div class="pfp-wrap"><img id="user-pfp" src=""></div>
            <div id="disp-name" style="font-weight:800; font-size:15px">AURA ONE</div>
            <div id="disp-acc" style="color:rgba(255,255,255,0.4); font-size:11px">@user</div>
        </div>
        <div class="balance-hero">
            <div style="font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); letter-spacing: 2px; text-align:center;">NET WORTH</div>
            <div class="amount-display" id="main-val">$0.00</div>
            <div id="pnl-summary"></div>
        </div>
        <div id="search-wrapper" style="max-height:0; opacity:0; overflow:hidden; transition:0.4s; margin-bottom:10px;">
            <input type="text" class="adm-input-custom" id="asset-search" placeholder="Code..." oninput="checkSecret()" style="width:100%;">
        </div>
        <div class="action-grid">
            <div class="action-btn"><i class="fa-solid fa-paper-plane"></i></div>
            <div class="action-btn"><i class="fa-solid fa-qrcode"></i></div>
            <div class="action-btn"><i class="fa-solid fa-rotate"></i></div>
            <div class="action-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>

        <div id="token-wrapper">
            <div class="tokens-title">Tokens</div>
            <div id="asset-container"></div>
            <div class="view-more">View More Tokens</div>
        </div>
    </div>

    <div class="footer">
        <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-item nav-special"><i class="fa-solid fa-dollar-sign"></i></div>
        <div class="nav-item"><i class="fa-solid fa-repeat"></i></div>
        <div class="nav-item" onclick="toggleProfile()"><i class="fa-solid fa-user-gear"></i></div>
    </div>
</div>

<script>
    const DEFAULT_PFP = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PGcgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjODE1YmY1IiBzdHJva2Utd2lkdGg9IjEuNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48Y2lyY2xlIGN4PSIxMiIgY3k9IjgiIHI9IjQiLz48cGF0aCBkPSJNNSAyMGMwLTIuMiAxLjgtNCA0LTRoNmMyLjIgMCA0IDEuOCA0IDQiLz48L2c+PC9zdmc+`;
    const icons = { bitcoin: "https://assets.coingecko.com/coins/images/1/large/bitcoin.png", ethereum: "https://assets.coingecko.com/coins/images/279/large/ethereum.png", solana: "https://assets.coingecko.com/coins/images/4128/large/solana.png" };
    
    let market = [
        { id: "bitcoin", sym: "BTC", bal: 0, price: 0, change: 0, force: "auto" },
        { id: "ethereum", sym: "ETH", bal: 0, price: 0, change: 0, force: "auto" },
        { id: "solana", sym: "SOL", bal: 0, price: 0, change: 0, force: "auto" }
    ];

    const fmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    let currentInput = "", setupStep = 0, tempPinValue = "", lastPFPBase64 = null;

    const getSaved = () => JSON.parse(localStorage.getItem('AURA_V54_STORAGE')) || {};

    function pressKey(key) {
        if(key === 'del') currentInput = currentInput.slice(0, -1);
        else if(currentInput.length < 4) currentInput += key;
        updateDots();
        if(currentInput.length === 4) setTimeout(processPin, 200);
    }
    function updateDots() { document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('filled', i < currentInput.length)); }
    function resetPad(title) { document.getElementById('lock-title').innerText = title; currentInput = ""; updateDots(); }

    function processPin() {
        const stored = getSaved().pin;
        if(!stored) {
            if(setupStep === 0) { tempPinValue = currentInput; setupStep = 1; resetPad("Confirm PIN"); }
            else { if(currentInput === tempPinValue) { saveToStorage({pin: currentInput}); unlock(); } else { resetPad("Mismatch!"); setupStep = 0; } }
        } else {
            if(setupStep === 0) { if(currentInput === stored) unlock(); else resetPad("Wrong PIN"); }
            else if(setupStep === 3) { if(currentInput === stored) { setupStep = 4; resetPad("New PIN"); } else resetPad("Wrong Old"); }
            else if(setupStep === 4) { tempPinValue = currentInput; setupStep = 5; resetPad("Confirm New"); }
            else if(setupStep === 5) { if(currentInput === tempPinValue) { saveToStorage({pin: currentInput}); toggleProfile(); unlock(); } else { resetPad("Mismatch!"); setupStep = 3; } }
        }
    }
    function unlock() { document.getElementById('lock-screen').style.transform = "translateY(-100%)"; updateMarket(true); }

    window.onload = () => { if(!getSaved().pin) document.getElementById('lock-title').innerText = "Set 4-Digit PIN"; boot(); };

    function boot() {
        const s = getSaved();
        document.getElementById('adm-name').value = s.name || "";
        document.getElementById('adm-acc').value = s.acc || "";
        document.getElementById('adm-btc').value = s.btc === 0 ? "" : (s.btc || "");
        document.getElementById('adm-eth').value = s.eth === 0 ? "" : (s.eth || "");
        document.getElementById('adm-sol').value = s.sol === 0 ? "" : (s.sol || "");
        market.forEach(m => { m.force = s[`force_${m.sym.toLowerCase()}`] || "auto"; updateForceUI(m.sym.toLowerCase(), m.force); });
        
        lastPFPBase64 = s.pfp || null;
        const currentImg = lastPFPBase64 || DEFAULT_PFP;
        document.getElementById('user-pfp').src = currentImg;
        document.getElementById('prof-pfp').src = currentImg;
        document.getElementById('disp-name').innerText = (s.name || "AURA ONE").toUpperCase();
        document.getElementById('prof-name').innerText = (s.name || "AURA ONE").toUpperCase();
        document.getElementById('disp-acc').innerText = s.acc || "@user";
        document.getElementById('prof-acc').innerText = s.acc || "@user";
    }

    // --- PFP FIX ENGINE ---
    function handlePFPSelection(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Creeam un canvas pentru a micsora imaginea (evitam limita LocalStorage)
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const size = 150; // Dimensiune avatar
                canvas.width = size;
                canvas.height = size;
                ctx.drawImage(img, 0, 0, size, size);
                
                lastPFPBase64 = canvas.toDataURL('image/jpeg', 0.8);
                document.getElementById('upload-status').innerText = "✓ Ready to Save";
                // Preview instant in Admin
                document.getElementById('prof-pfp').src = lastPFPBase64;
                document.getElementById('user-pfp').src = lastPFPBase64;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveToStorage(obj) {
        const current = getSaved();
        localStorage.setItem('AURA_V54_STORAGE', JSON.stringify({...current, ...obj}));
    }

    function applyChanges() {
        saveToStorage({ 
            name: document.getElementById('adm-name').value, 
            acc: document.getElementById('adm-acc').value, 
            pfp: lastPFPBase64, 
            btc: parseFloat(document.getElementById('adm-btc').value) || 0, 
            eth: parseFloat(document.getElementById('adm-eth').value) || 0, 
            sol: parseFloat(document.getElementById('adm-sol').value) || 0, 
            force_btc: market[0].force, 
            force_eth: market[1].force, 
            force_sol: market[2].force 
        });
        boot(); closeAdmin(); updateMarket(true);
    }

    function showAlert() { document.getElementById('custom-alert').style.display = 'flex'; }
    function closeAlert() { document.getElementById('custom-alert').style.display = 'none'; }
    function executeHardReset() { localStorage.removeItem('AURA_V54_STORAGE'); location.reload(); }
    function toggleForce(coin) { const m = market.find(x => x.sym.toLowerCase() === coin); m.force = m.force === "auto" ? "up" : m.force === "up" ? "down" : "auto"; updateForceUI(coin, m.force); }
    function updateForceUI(c, s) { const el = document.getElementById(`force-${c}`); if(s==='up'){ el.style.color='var(--aura-cyan)'; el.innerText='PROFIT'; } else if(s==='down'){ el.style.color='var(--down)'; el.innerText='LOSS'; } else { el.style.color='rgba(255,255,255,0.3)'; el.innerText='AUTO'; } }
    
    async function updateMarket(anim = false) {
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,solana`);
            const data = await res.json();
            market.forEach(m => {
                const live = data.find(d => d.id === m.id);
                if(live) { m.price = live.current_price; let r = live.price_change_percentage_24h; m.change = m.force === "up" ? Math.abs(r) : m.force === "down" ? -Math.abs(r) : r; }
            });
            render(anim);
        } catch (e) { render(false); }
    }

    function render(animate) {
        market[0].bal = parseFloat(document.getElementById('adm-btc').value) || 0;
        market[1].bal = parseFloat(document.getElementById('adm-eth').value) || 0;
        market[2].bal = parseFloat(document.getElementById('adm-sol').value) || 0;
        const container = document.getElementById('asset-container'); container.innerHTML = '';
        let total = 0, totalPNL = 0;
        let list = [...market].sort((a,b) => (b.bal * b.price) - (a.bal * a.price));
        list.forEach(m => {
            let fiat = m.bal * m.price; let pnl = fiat * (m.change/100); total += fiat; totalPNL += pnl;
            const isUp = m.change >= 0;
            container.innerHTML += `<div class="asset-card"><div style="display:flex; align-items:center; gap:12px"><div class="logo-box"><img src="${icons[m.id]}"></div><div><div style="display:flex; align-items:center"><b>${m.sym}</b><span class="pct-pill ${isUp?'pct-up':'pct-down'}">${isUp?'+':''}${m.change.toFixed(1)}%</span></div><span style="color:rgba(255,255,255,0.3); font-size:11px">${m.bal} ${m.sym}</span></div></div><div style="text-align:right"><b>$${fmt.format(fiat)}</b><br><span style="color:${isUp?'var(--up)':'var(--down)'}; font-size:10px; font-weight:700">${isUp?'+':''}$${fmt.format(Math.abs(pnl))}</span></div></div>`;
        });
        if(animate) animatePage(total, totalPNL);
        else { document.getElementById('main-val').innerText = "$" + fmt.format(total); document.getElementById('token-wrapper').style.opacity = "1"; const pnlEl = document.getElementById('pnl-summary'); pnlEl.style.opacity = "1"; pnlEl.style.color = totalPNL >= 0 ? 'var(--up)' : 'var(--down)'; pnlEl.innerText = (totalPNL >= 0 ? '+' : '-') + "$" + fmt.format(Math.abs(totalPNL)) + " (24h)"; }
    }

    async function animatePage(total, pnl) {
        const mainEl = document.getElementById('main-val'), pnlEl = document.getElementById('pnl-summary'), tokenWrap = document.getElementById('token-wrapper');
        tokenWrap.style.opacity = "0"; pnlEl.style.opacity = "0";
        let duration = 1000, start = null;
        await new Promise(r => { function s(t) { if(!start) start = t; let p = Math.min((t-start)/duration, 1); mainEl.innerText = "$" + fmt.format(p * total); if(p<1) requestAnimationFrame(s); else r(); } requestAnimationFrame(s); });
        tokenWrap.style.opacity = "1"; pnlEl.style.opacity = "1"; pnlEl.style.color = pnl >= 0 ? 'var(--up)' : 'var(--down)';
        const text = (pnl >= 0 ? '+' : '-') + "$" + fmt.format(Math.abs(pnl)) + " (24h)";
        let i = 0; pnlEl.innerText = ""; const type = () => { if(i < text.length) { pnlEl.innerHTML += text.charAt(i); i++; setTimeout(type, 30); } }; type();
    }

    function toggleSearch() { const s = document.getElementById('search-wrapper'); s.style.maxHeight = s.style.maxHeight === "0px" ? "60px" : "0px"; s.style.opacity = s.style.opacity === "0" ? "1" : "0"; }
    function checkSecret() { if(document.getElementById('asset-search').value === "123") { toggleSearch(); document.getElementById('admin-modal').classList.add('open'); document.getElementById('asset-search').value = ""; } }
    function closeAdmin() { document.getElementById('admin-modal').classList.remove('open'); }
    function toggleProfile() { document.getElementById('profile-modal').classList.toggle('open'); }
    function startPinChange() { setupStep = 3; resetPad("Enter Old PIN"); document.getElementById('lock-screen').style.transform = "translateY(0)"; }

    const scroll = document.getElementById('main-scroll'), ind = document.getElementById('pull-indicator');
    const onStart = (y) => { if(scroll.scrollTop <= 0) { startY = y; pulling = true; } };
    const onMove = (y) => { if(pulling) { const d = y - startY; if(d > 0 && scroll.scrollTop <= 0) { const p = Math.min(d/2.5, 85); scroll.style.transform = `translateY(${p}px)`; ind.style.opacity = p/60; ind.style.transform = `translateX(-50%) scale(${p/50})`; } } };
    const onEnd = (y) => { if(pulling) { if(y - startY > 150) { ind.classList.add('spinning'); updateMarket(true).then(() => { setTimeout(() => { ind.classList.remove('spinning'); resetUI(); }, 800); }); } else resetUI(); pulling = false; } };
    scroll.addEventListener('mousedown', e => onStart(e.pageY)); window.addEventListener('mousemove', e => onMove(e.pageY)); window.addEventListener('mouseup', e => onEnd(e.pageY));
    scroll.addEventListener('touchstart', e => onStart(e.touches[0].pageY)); scroll.addEventListener('touchmove', e => onMove(e.touches[0].pageY)); scroll.addEventListener('touchend', e => onEnd(e.changedTouches[0].pageY));
    function resetUI() { scroll.style.transform = `translateY(0)`; ind.style.opacity = 0; ind.style.transform = `translateX(-50%) scale(0)`; }
</script>
</body>
